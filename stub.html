<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доступно только на компьютере</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 600px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-wrapper {
            margin-bottom: 30px;
            position: relative;
        }

        .icon {
            font-size: 80px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        .cross-mark {
            position: absolute;
            top: -10px;
            right: -20px;
            font-size: 50px;
            color: #e74c3c;
            font-weight: bold;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.7;
                transform: scale(1.1);
            }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
        }

        .message {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #b8c5d6;
            margin-bottom: 30px;
        }

        .highlight {
            color: #00d9ff;
            font-weight: 600;
        }

        .desktop-hint {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .desktop-hint p {
            margin-bottom: 15px;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            color: #00ff88;
        }

        .feature-icon {
            font-size: 1.2rem;
        }

        /* Desktop styles - hide the message on desktop */
        @media (min-width: 1024px) {
            .mobile-warning {
                display: none !important;
            }
        }

        /* Mobile styles - show only on mobile */
        @media (max-width: 1023px) {
            .desktop-only {
                display: none !important;
            }
            
            h1 {
                font-size: 2rem;
            }

            .icon {
                font-size: 60px;
            }

            .message {
                font-size: 1.1rem;
            }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 217, 255, 0.5);
            border-radius: 50%;
            animation: rise 15s infinite ease-in;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; }
        .particle:nth-child(3) { left: 30%; animation-delay: 4s; }
        .particle:nth-child(4) { left: 40%; animation-delay: 1s; }
        .particle:nth-child(5) { left: 50%; animation-delay: 3s; }
        .particle:nth-child(6) { left: 60%; animation-delay: 5s; }
        .particle:nth-child(7) { left: 70%; animation-delay: 2.5s; }
        .particle:nth-child(8) { left: 80%; animation-delay: 4.5s; }
        .particle:nth-child(9) { left: 90%; animation-delay: 1.5s; }

        @keyframes rise {
            0% {
                bottom: -10px;
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                bottom: 100vh;
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Particles background -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Mobile warning (visible only on mobile/tablet) -->
    <div class="container mobile-warning">
        <div class="icon-wrapper">
            <span class="icon">📱</span>
            <span class="cross-mark">✕</span>
        </div>
        
        <h1>Только для ПК</h1>
        
        <div class="desktop-hint">
            <p class="message">
                К сожалению, мобильная версия сайта временно недоступна.<br>
                Пожалуйста, откройте этот сайт с <span class="highlight">компьютера или ноутбука</span> для полноценной работы.
            </p>
            
            <p style="color: #00d9ff; font-weight: 600; margin-bottom: 20px;">
                💡 Почему нужен компьютер?
            </p>
            
            <div class="features">
                <div class="feature-item">
                    <span class="feature-icon">✓</span>
                    <span>Больше экран</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">✓</span>
                    <span>Удобнее работа</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">✓</span>
                    <span>Все функции</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Desktop content (visible only on desktop) -->
    <div class="container desktop-only">
        <!-- Здесь будет основной контент сайта для десктопа -->
        <!-- Эта секция скрыта на мобильных устройствах -->
    </div>

    <script>
        // Проверка размера экрана и переключение видимости
        function checkScreenSize() {
            const mobileWarning = document.querySelector('.mobile-warning');
            const desktopOnly = document.querySelector('.desktop-only');
            const isDesktop = window.innerWidth >= 1024;

            if (isDesktop) {
                if (mobileWarning) mobileWarning.style.display = 'none';
                if (desktopOnly) desktopOnly.style.display = 'block';
            } else {
                if (mobileWarning) mobileWarning.style.display = 'block';
                if (desktopOnly) desktopOnly.style.display = 'none';
            }
        }

        // Запуск проверки при загрузке и изменении размера окна
        window.addEventListener('load', checkScreenSize);
        window.addEventListener('resize', checkScreenSize);
    </script>
</body>
</html>
