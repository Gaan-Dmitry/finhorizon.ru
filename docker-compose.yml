version: '3.9'
services:
  mysql:
    image: mysql:8.4
    container_name: finhorizon-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: finhorizon
      MYSQL_USER: finhorizon
      MYSQL_PASSWORD: finhorizon
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: finhorizon-phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    ports:
      - '8081:80'

volumes:
  mysql_data:
